<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renés Podcasts</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-placeholder">now and then</div>
        <h1>Renès Podcasts</h1>
        <button id="btn-random" class="circle-btn random-btn">zufall</button>
    </header>

    <main class="category-selection">
        <div class="category-grid">
            <div class="category-item">
                <span class="category-label">politik</span>
                <button class="circle-btn cat-btn" data-category="politik" style="background-color: #a84343;" aria-label="Politik"></button>
            </div>
            <div class="category-item">
                <span class="category-label" id="label-history">geschichte</span>
                <button class="circle-btn cat-btn" data-category="geschichte" style="background-color: #3b52ab;" aria-label="Geschichte"></button>
            </div>
            <div class="category-item">
                <span class="category-label">kunst</span>
                <button class="circle-btn cat-btn" data-category="kunst" style="background-color: #5ce676;" aria-label="Kunst"></button>
            </div>
            <div class="category-item">
                <span class="category-label">musik</span>
                <button class="circle-btn cat-btn" data-category="musik" style="background-color: #b55ce6;" aria-label="Musik"></button>
            </div>
        </div>
    </main>

    <section id="episode-section" class="episode-section hidden" aria-label="Episoden">
        <div class="section-content">
            <button id="btn-back" class="circle-btn back-btn" aria-label="Zurueck zur Themenauswahl">zurück</button>
            <div id="episode-list" class="episode-list">
            </div>
        </div>
    </section>

    <!--
      DESIGN-TEMPLATE: Aufbau einer Episoden-Karte.
      Ohne Code-Kenntnisse anpassbar: Texte/Reihenfolge frei aendern.
      Platzhalter NICHT loeschen: data-field="title|meta|summary|image|link" und die Buttons.
    -->
    <template id="episode-card-template">
        <article class="episode-card">
            <div class="card-main">
                <div class="episode-info">
                    <h3 class="episode-title" data-field="title"></h3>
                    <p class="episode-meta" data-field="meta"></p>
                </div>
                <button class="circle-btn play-stop-btn" type="button">HÖREN</button>
            </div>
            <div class="episode-detail">
                <img class="episode-image" data-field="image" alt="">
                <p class="episode-summary" data-field="summary"></p>
                <a class="source-link" data-field="link" target="_blank" rel="noopener">Zur Originalseite</a>
            </div>
        </article>
    </template>

    <audio id="global-player" preload="none"></audio>

    <script src="app.js"></script>
</body>
</html>

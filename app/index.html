<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renés Podcasts</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-placeholder">now and then</div>
        <h1>Renés Podcasts</h1>
        <button id="btn-random" class="circle-btn random-btn" type="button">
            <span class="random-btn-label">zufall</span>
        </button>
    </header>

    <main class="category-selection">
        <!-- Themen-Buttons werden aus config/topics.json + API erzeugt -->
        <div id="category-grid" class="category-grid"></div>
    </main>

    <section id="episode-section" class="episode-section hidden" aria-label="Episoden">
        <div class="section-content">
            <button id="btn-back" class="circle-btn back-btn" aria-label="Zurueck zur Themenauswahl">zurück</button>
            <div id="episode-list" class="episode-list">
            </div>
        </div>
    </section>

    <!--
      DESIGN-TEMPLATE: Aufbau einer Episoden-Karte.
      Ohne Code-Kenntnisse anpassbar: Texte/Reihenfolge frei aendern.
      Platzhalter NICHT loeschen: data-field="title|meta|summary|image|link" und die Buttons.
    -->
    <template id="episode-card-template">
        <article class="episode-card">
            <div class="card-main">
                <button class="circle-btn play-stop-btn" type="button">
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
                        <polygon class="play-icon" points="34,20 76,50 34,80" fill="currentColor" />
                        <rect class="stop-icon hidden" x="28" y="28" width="44" height="44" rx="3" fill="currentColor" />
                    </svg>
                </button>
                <div class="episode-info">
                    <h3 class="episode-title" data-field="title"></h3>
                    <p class="episode-meta" data-field="meta"></p>
                </div>
                <div class="episode-duration-badge" data-field="duration"></div>
            </div>
            <div class="progress-container hidden">
                <div class="progress-bar-wrapper">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>
                <div class="time-display">
                    <span class="current-time">0:00</span>  <span class="total-time">0:00</span>
                </div>
            </div>
            <div class="episode-detail">
                <img class="episode-image" data-field="image" alt="">
                <p class="episode-summary" data-field="summary"></p>
                <a class="source-link" data-field="link" target="_blank" rel="noopener">Zur Originalseite</a>
            </div>
        </article>
    </template>

    <!-- Themen-Button-Template (Reihenfolge/Markup frei anpassbar) -->
    <template id="category-item-template">
        <div class="category-item">
            <button class="circle-btn cat-btn" type="button"></button>
            <span class="category-label" data-field="label"></span>
        </div>
    </template>

    <audio id="global-player" preload="none"></audio>

    <script src="app.js"></script>
</body>
</html>

name: Update content API

on:
  push:
    branches:
      - main
    paths:
      - "docs/api/feeds.json"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"

  schedule:
    - cron: "0 5 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-content-api
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update content API
        run: npm run update

      - name: Commit generated API
        shell: bash
        run: |
          if git diff --quiet -- docs/api; then
            echo "No API changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/api

          git commit -m "Update content API"

          git push